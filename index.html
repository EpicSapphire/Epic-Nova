<!DOCTYPE html>
<html>
<head>
  <title>Epic Nova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Link to external CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hero">
    <img src="images/Epic_Nova_Logo.png" class="logo">

    <h1>Epic Nova</h1>
    <p>Override Reality.</p>

    <div class="menu">
      <a href="YOUR-SHOP-LINK" class="btn">▶ Buy Sticker Pack</a>
      <a href="#email" class="btn">✦ Join the Nova Core</a>
    </div>
  </div>

  <div class="section" id="email">
    <h2>Join the Nova Core</h2>
    <p>Get early drops, exclusive content, and insider access.</p>

    <form>
      <input type="email" placeholder="Enter your email">
      <button class="btn form-btn">Join Now</button>
    </form>
  </div>

  <div class="section">
    <h2>This Is Your Game</h2>
    <h3>Enter the Nova Core</h3>

    <p>The beginning of something bigger.</p>
  </div>

  <audio id="clickSound" src="sounds/menu-click.mp3" preload="auto"></audio>

  <script>
  const clickSound = document.getElementById("clickSound");

  document.querySelectorAll(".btn").forEach(button => {
    button.addEventListener("click", () => {
      clickSound.currentTime = 0;
      clickSound.play();
      clickSound.volume = 0.1;
    });
  });
</script>

</body>
</html>
