<!DOCTYPE html>
<html>
<head>
  <title>Epic Nova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b0f1a, #05070d);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      margin-top: 20px;
    }

    .logo {
      width: 90vw;
      max-width: 900px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.4));
    }

    h1 {
      font-size: 3em;
      margin: 0;
      background: linear-gradient(90deg, #00f0ff, #8a2eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero h1 {
      font-size: 3rem;
      margin: 0;
    }

    p {
      opacity: 0.8;
    }

    .hero p {
      font-size: 1.5rem;
      color: #aaa;
      margin-top: 10px;
    }

    .cta {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(90deg, #00f0ff, #8a2eff);
      border: none;
      padding: 15px 30px;
      font-size: 1em;
      color: white;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #00f0ff;
    }

    .section {
      padding: 60px 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin: 20px auto;
      max-width: 300px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    #fallback h1 {
      font-size: 3rem;
      margin: 0;
    }

    #fallback p {
      font-size: 1.5rem;
      color: #aaa;
    }
  </style>
</head>

<body>

  </div>-->

  <div class="hero">

    <img src="images/Epic_Nova_Logo.png" alt="Epic Nova Logo" class="logo">
    
    <h1>Epic Nova</h1>
    <p>Override Reality.</p>

    <div class="cta">      
      <button class="btn">Buy Our Sticker Pack!</button>      
    </div>
  </div>

  <div class="section">
    <h2>This Is Your Game</h2>
    <h3>Enter the Nova Core</h2>
    <p>The beginning of something bigger. Stay tuned.</p>
    <p>You're not just a player. You're part of something bigger.</p>
  </div>

</body>
</html>
