<!DOCTYPE html>
<html>
<head>
  <title>Epic Nova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b0f1a, #05070d);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 3em;
      margin: 0;
      background: linear-gradient(90deg, #00f0ff, #8a2eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      opacity: 0.8;
    }

    .cta {
      margin-top: 30px;
    }

    .btn {
      background: linear-gradient(90deg, #00f0ff, #8a2eff);
      border: none;
      padding: 15px 30px;
      font-size: 1em;
      color: white;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #00f0ff;
    }

    .section {
      padding: 60px 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin: 20px auto;
      max-width: 300px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Epic Nova</h1>
    <p>Override Reality.</p>

    <div class="cta">
  <button class="btn">Enter the Game</button>

</div>
  </div>

  <div class="section">
    <h2>This Is Your Game</h2>
    <p>You're not just a player. You're part of something bigger.</p>
  </div>

  <div class="section">
    <h2>Coming Soon</h2>

    <div class="card">
      <h3>🔥 Stickers</h3>
      <p>High-quality Nova designs</p>
    </div>

    <div class="card">
      <h3>🎮 Games</h3>
      <p>Epic gameplay powered by the Nova Core</p>
    </div>

    <div class="card">
      <h3>💎 Exclusive Content</h3>
      <p>Join the Nova community</p>
    </div>

    <button onclick="window.location.href='#buy'">
  Buy Our Sticker Pack!
</button>

  </div>

</body>
</html>
